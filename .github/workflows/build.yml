name: Build RSDKv5u (Win & Android)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  windows-build:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          cmake -B build -DRETRO_REVISION=3
          cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: RSDKv5u-Windows
          path: build/Release/RSDKv5U.exe

  android-build:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: RSDKv5u-Android
          path: android/app/build/outputs/apk/debug/*.apk

